name: Deploy dbt Docs to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy_docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dbt
        run: pip install dbt-bigquery==1.11.12
        
      - name: Debug environment
        run: |
          echo "=== dbt version ==="
          dbt --version

          echo "=== profiles.yml content ==="
          cat ~/.dbt/profiles.yml

          echo "=== project directory structure ==="
          find dbt_transperth/models -name "*.yml" | sort

          echo "=== sources.yml content ==="
          cat dbt_transperth/models/bronze/sources.yml

      - name: Write service account key
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa_key.json

      - name: Write profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          dbt_transperth:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: service-account
                project: ${{ secrets.GCP_PROJECT_ID }}
                dataset: prod
                keyfile: /tmp/sa_key.json
                location: us-central1
                threads: 4
                timeout_seconds: 300
          EOF

      - name: Generate dbt docs
        run: |
          cd dbt_transperth
          dbt compile --target prod
          dbt docs generate --target prod

      - name: Inline JSON into index.html
        run: |
          python3 << 'EOF'
          import json
          from pathlib import Path

          target = Path("dbt_transperth/target")

          manifest = json.loads((target / "manifest.json").read_text())
          catalog  = json.loads((target / "catalog.json").read_text())

          index_html = (target / "index.html").read_text()

          # dbt's index.html has placeholder strings it expects to be replaced
          index_html = index_html.replace(
              "o=[i('manifest','manifest.json'+t),i('catalog','catalog.json'+t)]",
              f"o=[{{label: 'manifest', data: {json.dumps(manifest)}}},{{label: 'catalog', data: {json.dumps(catalog)}}}]"
          )

          (target / "index.html").write_text(index_html)
          print("Done — JSON inlined into index.html")
          EOF

      - name: Move docs to /docs folder
        run: |
          mkdir -p docs
          cp dbt_transperth/target/manifest.json docs/
          cp dbt_transperth/target/catalog.json  docs/
          cp dbt_transperth/target/index.html    docs/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
name: Deploy dbt Docs to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  deploy_docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dbt
        run: pip install dbt-bigquery

      - name: Write service account key
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > /tmp/sa_key.json

      - name: Write profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          dbt_transperth:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: service-account
                project: ${{ secrets.GCP_PROJECT_ID }}
                dataset: gold
                keyfile: /tmp/sa_key.json
                location: us-central1
                threads: 4
                timeout_seconds: 300
          EOF

      - name: Generate dbt docs
        run: |
          cd dbt_transperth
          dbt docs generate --target prod

      - name: Move docs to /docs folder
        run: |
          mkdir -p docs
          cp dbt_transperth/target/manifest.json docs/
          cp dbt_transperth/target/catalog.json  docs/
          cp dbt_transperth/target/index.html    docs/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
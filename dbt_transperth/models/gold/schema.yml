version: 2

models:
  - name: gold_stop_times
    description: >
      Cleaned stops table from the Transperth GTFS feed.
      One row per physical stop or station, with geographic coordinates.
    columns:
      - name: trip_headsign
        description: Public-facing name of the trip, usually the destination or route variant.
        tests:
          - not_null

      - name: direction_label
        description: Human-readable label for the direction of travel (e.g. "Outbound", "Inbound").
        tests:
          - not_null

      - name: stop_name
        description: Public-facing name of the stop or station.
        tests:
          - not_null

      - name: supported_modes
        description: Comma-separated list of transport modes that serve this stop (e.g. "Bus, Rail").
        tests:
          - not_null

      - name: arrival_time
        description: >
          Scheduled arrival time in HH:MM:SS format.
          Note: GTFS allows values beyond 24:00:00 for overnight services.
          Kept as a string to preserve these values.
        tests:
          - not_null

      - name: departure_time
        description: >
          Scheduled departure time in HH:MM:SS format.
          Note: GTFS allows values beyond 24:00:00 for overnight services.
          Kept as a string to preserve these values.
        tests:
          - not_null

      - name: stop_lat
        description: Latitude of the stop or station in decimal degrees.
        tests:
          - not_null

      - name: stop_lon
        description: Longitude of the stop or station in decimal degrees.
        tests:
          - not_null

  # ---------------------------------------------------------------------------